<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PureScan AI — Scan product labels, analyze ingredients, and get healthier product suggestions.">
    <link rel="stylesheet" href="/static/ai-scan.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>PureScan — AI Scanner</title>
</head>

<body>
    <!-- === NAV BAR === -->
    <nav>
        <div class="brand-logo">
            <span class="leaf">🌿</span>
            <div class="brand-text">
                <span class="brand-name">PureScan</span>
                <p>AI-Powered Ingredient Scanner</p>
            </div>
        </div>
        <button class="nav-btn" id="home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor"
                stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Home
        </button>
    </nav>

    <!-- === WELCOME === -->
    <div id="wellcome"></div>

    <!-- === RESULTS AREA === -->
    <div id="results">
        <div id="chatbox">
            <img id="previewImage" style="max-width:250px; margin:auto; display:none;" />
        </div>
    </div>

    <!-- === BOTTOM ACTION BAR === -->
    <div class="scan-page">
        <div class="action-group">
            <button id="galleryBtn" class="icon-btn" title="Upload from gallery">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="14" rx="2" />
                    <circle cx="8" cy="10" r="2" />
                    <path d="M21 15l-5-5L5 19" />
                </svg>
            </button>

            <button id="cameraBtn" class="icon-btn" title="Take a photo">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path d="M4 7h3l2-2h6l2 2h3v13H4z" />
                    <circle cx="12" cy="13" r="3" />
                </svg>
            </button>
        </div>

        <input type="text" class="input-field" id="chatInput" placeholder="Ask about products, remedies, food..."
            autocomplete="off">

        <button class="send-btn" id="sendChatBtn" title="Send message">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
            </svg>
        </button>

        <button id="readAloudBtn" class="icon-btn speak-btn" title="Read aloud">
            🔊
        </button>
    </div>

    <!-- Hidden File Inputs -->
    <input type="file" id="galleryInput" accept="image/*" class="hidden">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
    <script src="/static/purescan.js"></script>
</body>

</html>
